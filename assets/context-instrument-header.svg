<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Animated AI contribution model board</title>
  <desc id="desc">A GitHub contribution graph becomes an AI attention board, routing selected cells into a model chip and provider-ready outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="50%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <linearGradient id="boardFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d1320"/>
      <stop offset="100%" stop-color="#09101c"/>
    </linearGradient>
    <filter id="chipGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <symbol id="cell" viewBox="0 0 13 13">
      <rect width="13" height="13" rx="3"/>
    </symbol>
    <style>
      .line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .base { fill: #1b2639; opacity: .58; }
      .low { fill: #224034; opacity: .58; }
      .green { fill: #2dd48e; }
      .blue { fill: #58a6ff; }
      .amber { fill: #ffc457; }
      .whiteLine { stroke: #e6edf9; }
      @keyframes baseBreathe { 0%,100%{opacity:.42} 48%{opacity:.62} }
      @keyframes lowWake { 0%,100%{opacity:.24} 28%{opacity:.66} 70%{opacity:.40} }
      @keyframes selectedWake { 0%,100%{opacity:.18} 26%{opacity:.92} 66%{opacity:.56} }
      @keyframes scoreFlash { 0%,100%{opacity:0; transform:scale(1)} 36%{opacity:.78; transform:scale(1.38)} 58%{opacity:0; transform:scale(1)} }
      @keyframes sweep { 0%,100%{opacity:0; transform:translateX(0)} 8%{opacity:.32} 62%{opacity:.26; transform:translateX(1018px)} 90%{opacity:0; transform:translateX(1018px)} }
      @keyframes route { to { stroke-dashoffset:-360; } }
      @keyframes chipPulse { 0%,100%{opacity:.28} 52%{opacity:.72} }
      @keyframes aiGlow { 0%,100%{opacity:.42} 42%{opacity:.92} }
      @keyframes lattice { 0%,100%{opacity:.12} 52%{opacity:.54} }
      @keyframes cores { 0%,100%{opacity:.24} 56%{opacity:.88} }
      @keyframes tokenA { 0%,100%{opacity:0; offset-distance:0%} 12%{opacity:1} 44%{opacity:1; offset-distance:100%} 48%{opacity:0; offset-distance:100%} }
      @keyframes tokenB { 0%,50%{opacity:0; offset-distance:0%} 62%{opacity:.95} 84%{opacity:.75; offset-distance:100%} 94%,100%{opacity:0; offset-distance:100%} }
      @keyframes tokenC { 0%,58%{opacity:0; offset-distance:0%} 70%{opacity:.95} 90%{opacity:.75; offset-distance:100%} 98%,100%{opacity:0; offset-distance:100%} }
    </style>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect x="55" y="48" width="1090" height="204" rx="18" fill="url(#boardFill)" opacity=".92"/>
  <rect x="55" y="48" width="1090" height="204" rx="18" fill="none" stroke="#4d5e7e" stroke-width="1.1" opacity=".34"/>

  <g class="base" style="animation:baseBreathe 5s ease-in-out infinite">
    <use href="#cell" x="76" y="72"/><use href="#cell" x="101" y="118"/><use href="#cell" x="126" y="164"/><use href="#cell" x="151" y="72"/>
    <use href="#cell" x="176" y="141"/><use href="#cell" x="201" y="210"/><use href="#cell" x="226" y="95"/><use href="#cell" x="251" y="187"/>
    <use href="#cell" x="276" y="118"/><use href="#cell" x="301" y="72"/><use href="#cell" x="326" y="164"/><use href="#cell" x="351" y="210"/>
    <use href="#cell" x="376" y="95"/><use href="#cell" x="401" y="141"/><use href="#cell" x="426" y="187"/><use href="#cell" x="451" y="72"/>
    <use href="#cell" x="476" y="118"/><use href="#cell" x="501" y="164"/><use href="#cell" x="526" y="210"/><use href="#cell" x="551" y="95"/>
    <use href="#cell" x="576" y="141"/><use href="#cell" x="601" y="187"/><use href="#cell" x="626" y="72"/><use href="#cell" x="651" y="118"/>
    <use href="#cell" x="676" y="164"/><use href="#cell" x="701" y="210"/><use href="#cell" x="726" y="95"/><use href="#cell" x="751" y="141"/>
    <use href="#cell" x="776" y="187"/><use href="#cell" x="801" y="72"/><use href="#cell" x="826" y="118"/><use href="#cell" x="851" y="164"/>
    <use href="#cell" x="876" y="210"/><use href="#cell" x="901" y="95"/><use href="#cell" x="926" y="141"/><use href="#cell" x="951" y="187"/>
    <use href="#cell" x="976" y="72"/><use href="#cell" x="1001" y="118"/><use href="#cell" x="1026" y="164"/><use href="#cell" x="1051" y="210"/>
  </g>

  <g class="low" style="animation:lowWake 5s ease-in-out infinite">
    <use href="#cell" x="101" y="118"/><use href="#cell" x="151" y="72"/><use href="#cell" x="176" y="164"/><use href="#cell" x="226" y="95"/>
    <use href="#cell" x="251" y="210"/><use href="#cell" x="301" y="141"/><use href="#cell" x="351" y="72"/><use href="#cell" x="401" y="187"/>
    <use href="#cell" x="451" y="118"/><use href="#cell" x="501" y="164"/><use href="#cell" x="551" y="95"/><use href="#cell" x="601" y="210"/>
    <use href="#cell" x="651" y="141"/><use href="#cell" x="701" y="72"/><use href="#cell" x="751" y="187"/><use href="#cell" x="801" y="118"/>
    <use href="#cell" x="851" y="164"/><use href="#cell" x="901" y="95"/><use href="#cell" x="951" y="210"/><use href="#cell" x="1001" y="141"/>
    <use href="#cell" x="1051" y="72"/>
  </g>

  <g class="green" style="animation:selectedWake 5s ease-in-out infinite">
    <use href="#cell" x="151" y="95"/><use href="#cell" x="201" y="164"/><use href="#cell" x="251" y="118"/>
    <use href="#cell" x="301" y="187"/><use href="#cell" x="351" y="72"/><use href="#cell" x="376" y="141"/>
    <use href="#cell" x="426" y="210"/>
  </g>

  <path d="M151 95 C280 95 405 95 526 95" class="line" stroke="#2dd48e" stroke-width="1.45" opacity=".50" stroke-dasharray="150 210" style="animation:route 5s linear infinite"/>
  <path d="M376 141 C450 141 520 141 576 141" class="line" stroke="#2dd48e" stroke-width="1.45" opacity=".50" stroke-dasharray="140 220" style="animation:route 5s linear infinite"/>
  <path d="M301 187 C420 187 505 164 526 187" class="line" stroke="#2dd48e" stroke-width="1.45" opacity=".45" stroke-dasharray="130 230" style="animation:route 5s linear infinite"/>
  <path d="M251 118 C360 118 440 95 526 95" class="line" stroke="#58a6ff" stroke-width="1.35" opacity=".38" stroke-dasharray="110 250" style="animation:route 5s linear infinite"/>
  <path d="M426 210 C500 187 540 164 576 141" class="line" stroke="#58a6ff" stroke-width="1.35" opacity=".38" stroke-dasharray="100 260" style="animation:route 5s linear infinite"/>

  <g fill="none" stroke="#e6edf9" stroke-width="1.2" opacity=".44">
    <polygon points="526,73 545,84 545,106 526,117 507,106 507,84"/>
    <polygon points="576,119 595,130 595,152 576,163 557,152 557,130"/>
    <polygon points="526,165 545,176 545,198 526,209 507,198 507,176"/>
  </g>
  <g class="blue" style="animation:cores 5s ease-in-out infinite">
    <circle cx="526" cy="95" r="4.5"/><circle cx="576" cy="141" r="4.5"/><circle cx="526" cy="187" r="4.5"/>
  </g>
  <g class="amber" style="animation:scoreFlash 5s ease-in-out infinite; transform-origin:543px 141px">
    <use href="#cell" x="526" y="95"/><use href="#cell" x="576" y="141"/><use href="#cell" x="526" y="187"/>
  </g>

  <path d="M64 56 L64 244" class="line whiteLine" stroke-width="1.1" opacity=".28" style="animation:sweep 5s cubic-bezier(.42,0,.58,1) infinite"/>

  <g opacity=".38">
    <path d="M647 87 L647 99 M671 87 L671 99 M695 87 L695 99 M719 87 L719 99 M743 87 L743 99" class="line" stroke="#4d5e7e" stroke-width="1.4"/>
    <path d="M647 195 L647 207 M671 195 L671 207 M695 195 L695 207 M719 195 L719 207 M743 195 L743 207" class="line" stroke="#4d5e7e" stroke-width="1.4"/>
    <path d="M635 105 L649 105 M635 129 L649 129 M635 153 L649 153 M635 177 L649 177" class="line" stroke="#4d5e7e" stroke-width="1.4"/>
    <path d="M755 105 L769 105 M755 129 L769 129 M755 153 L769 153 M755 177 L769 177" class="line" stroke="#4d5e7e" stroke-width="1.4"/>
  </g>
  <rect x="645" y="95" width="112" height="92" rx="14" fill="#0f1624" opacity=".96"/>
  <rect x="660" y="110" width="82" height="62" rx="10" fill="#141e30" opacity=".94"/>
  <rect x="645" y="95" width="112" height="92" rx="14" fill="none" stroke="#2dd48e" stroke-width="1.5" opacity=".52" style="animation:chipPulse 5s ease-in-out infinite"/>
  <g class="line whiteLine" stroke-width="3.2" opacity=".78" style="animation:aiGlow 5s ease-in-out infinite">
    <!-- AI mark moved slightly left within the chip -->
    <path d="M668 161 L682 123 L696 161"/>
    <path d="M674 145 L690 145"/>
    <path d="M714 123 L734 123"/>
    <path d="M724 123 L724 161"/>
    <path d="M714 161 L734 161"/>
  </g>

  <g class="line" stroke="#58a6ff" stroke-width="1.45" opacity=".42" style="animation:lattice 5s ease-in-out infinite">
    <path d="M776 118 L851 95 L926 118 L1001 95 L1076 118"/>
    <path d="M776 164 L851 187 L926 164 L1001 187 L1076 164"/>
    <path d="M851 95 L851 187"/>
    <path d="M1001 95 L1001 187"/>
  </g>
  <g class="blue" style="animation:cores 5s ease-in-out infinite">
    <circle cx="776" cy="118" r="4.5"/><circle cx="851" cy="95" r="4.5"/><circle cx="926" cy="118" r="4.5"/>
    <circle cx="1001" cy="95" r="4.5"/><circle cx="1076" cy="118" r="4.5"/><circle cx="776" cy="164" r="4.5"/>
    <circle cx="851" cy="187" r="4.5"/><circle cx="926" cy="164" r="4.5"/><circle cx="1001" cy="187" r="4.5"/><circle cx="1076" cy="164" r="4.5"/>
  </g>

  <g fill="none" stroke="#e6edf9" stroke-width="1.4" opacity=".46">
    <rect x="1063" y="83" width="24" height="24" rx="6"/>
    <rect x="1063" y="129" width="24" height="24" rx="6"/>
    <rect x="1063" y="175" width="24" height="24" rx="6"/>
  </g>
  <g class="green" style="animation:cores 5s ease-in-out infinite">
    <use href="#cell" x="1069" y="89"/><use href="#cell" x="1069" y="135"/><use href="#cell" x="1069" y="181"/>
  </g>

  <rect width="11" height="11" rx="3" class="green" style="offset-path:path('M151 95 C280 95 405 95 526 95'); animation:tokenA 5s linear infinite"/>
  <rect width="10" height="10" rx="3" class="amber" style="offset-path:path('M576 141 C610 141 630 141 701 141'); animation:tokenB 5s linear infinite"/>
  <rect width="10" height="10" rx="3" class="blue" style="offset-path:path('M776 118 L851 95 L926 118 L1001 95 L1076 118'); animation:tokenC 5s linear infinite"/>
</svg>
