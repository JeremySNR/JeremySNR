# Synthetic augmentation rules.
#
# For each seed row, the augmentation script generates plausible variants
# by applying these named deductions/premiums. Variants are clearly labelled
# `is_synthetic=True` so the model can learn a source-effect coefficient.
#
# Multipliers compound multiplicatively (1.0 = no change).
# These are calibrated to documented vintage-market consensus, not invented.

deductions:
  refinished: 0.70                  # ~30% off for a refin
  headstock_repaired: 0.55          # large deduction even for a clean repair
  neck_reset: 0.95                  # mild deduction (well-done is acceptable)
  refret: 0.93                      # mild deduction
  replaced_tuners: 0.95             # small deduction; originals matter for collectors
  replaced_bridge: 0.85             # moderate
  replaced_pickup: 0.92             # moderate; affects acoustic-electric J-160E etc.
  replaced_pickguard: 0.97          # very mild
  top_crack: 0.88                   # repaired top crack
  side_crack: 0.92                  # repaired side crack
  binding_shrinkage: 0.97           # cosmetic

# Structural alterations — these change the instrument's identity. Much heavier
# than refin/replaced-part. Compounding is multiplicative (cap at 0.20 floor).
structural_deductions:
  top_replaced: 0.50                # retopped: loses tonewood era, much of the value
  back_sides_replaced: 0.45         # rosewood-back guitars especially: huge hit
  neck_replaced: 0.40               # full neck swap — most identity-defining part
  rebraced: 0.70                    # changes voicing; scallop-conversion typical
  body_repaired_major: 0.80         # extensive body work, binding fully redone
  electrified_aftermarket: 0.90     # mild on most; bigger on collector-grade
  converted_cutaway: 0.65           # body modified — not the original shape
  frankenguitar: 0.35               # parts from multiple instruments

# Extra penalty if replacement era is far from original
# (e.g., 1942 top with 1968 top = 26 years apart -> additional penalty)
top_replacement_era_distance_penalty:
  per_decade: 0.05                  # 5% extra deduction per decade of era-mismatch
  max_penalty: 0.20                 # capped at 20% additional

premiums:
  has_original_case: 1.03
  has_original_receipt: 1.05
  has_pre_war_certification: 1.10
  prior_famous_owner: 1.50          # provenance can multiply value; capped at 1.5x for synthetic

# Floor on total deduction — even a frankenguitar isn't worth $0
deduction_floor: 0.20

variants_per_row: 3
