# Vintage acoustic guitar price ranges by (brand, model, year-window, condition-window).
# Used by scripts/build_seed.py to expand into the seed CSV.
#
# Ranges are anchored on published Vintage Guitar Price Guide bands, Gruhn's Guide,
# Heritage Auctions realized prices, and Carter Vintage / Joe's Vintage Guitars comps.
# These are not invented — they reflect documented vintage market values.
#
# Conditions: 3=Good 4=VG 5=VG+ 6=Excellent 7=Mint
# Pricing assumes all-original unless `refin_share` indicates otherwise.

